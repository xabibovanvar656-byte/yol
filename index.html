<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Yoʻl — ПДД</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#eef4f0;--card:#ffffff;--ink:#0f1f18;--ink2:#566b60;--ink3:#9aaaa0;--line:#e6efe9;
  --green:#00b86b;--green-d:#059862;--mint:#e3f9ee;
  --amber:#ff9d0a;--amber-s:#fff4e2;--red:#ff4259;--red-s:#ffe9ec;
  --f:'Manrope',-apple-system,system-ui,sans-serif;
}
[data-dark]{
  --bg:#11160f;--card:#1a211a;--ink:#e8efe9;--ink2:#9db0a4;--ink3:#6b7d72;--line:#26302a;
  --mint:#16291f;--amber-s:#2a2410;--red-s:#2a1419;
}
body{font-family:var(--f);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;max-width:480px;margin:0 auto;position:relative;min-height:100vh;overflow-x:hidden;transition:background .3s}
.app{padding:16px 17px 110px;min-height:100vh}
.hidden{display:none !important}

/* загрузка */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
.spinner{width:44px;height:44px;border:4px solid var(--mint);border-top-color:var(--green);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* шапка */
.top{display:flex;align-items:center;gap:11px;margin-bottom:18px}
.logo{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#00c878,#059862);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 18px -8px rgba(0,184,107,.5);flex-shrink:0}
.logo svg{width:22px;height:22px}
.top .bname{font-size:18px;font-weight:800;letter-spacing:-.5px}
.lang{margin-left:auto;display:flex;background:var(--card);border-radius:99px;padding:3px;box-shadow:0 4px 14px -8px rgba(15,31,24,.2)}
.lang button{border:none;background:none;font-family:var(--f);font-size:12px;font-weight:800;padding:5px 12px;border-radius:99px;color:var(--ink3);cursor:pointer;transition:.2s}
.lang button.on{background:var(--green);color:#fff}

/* общие компоненты */
.h1{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:18px}
.sec{font-size:13px;font-weight:800;color:var(--ink2);margin:4px 4px 12px;display:flex;align-items:center;letter-spacing:-.2px}
.sec .more{margin-left:auto;font-size:12px;color:var(--green);font-weight:700;cursor:pointer}
.btn-main{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:linear-gradient(135deg,#00b86b,#059862);color:#fff;font-size:16px;font-weight:800;padding:16px;border:none;border-radius:17px;cursor:pointer;font-family:var(--f);box-shadow:0 12px 28px -12px rgba(0,184,107,.6);transition:transform .15s}
.btn-main:active{transform:scale(.98)}
.btn-ghost{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--card);color:var(--ink);font-size:15px;font-weight:700;padding:14px;border:1.5px solid var(--line);border-radius:15px;cursor:pointer;font-family:var(--f)}

/* HERO готовность */
.road-card{background:linear-gradient(160deg,#00b86b,#03704c);border-radius:26px;padding:22px 22px 0;color:#fff;position:relative;overflow:hidden;margin-bottom:16px;box-shadow:0 18px 40px -18px rgba(0,184,107,.5)}
.road-card .glow{position:absolute;top:-50px;right:-40px;width:170px;height:170px;background:rgba(255,255,255,.12);border-radius:50%}
.road-card .lbl{font-size:12.5px;opacity:.85;font-weight:600;position:relative;letter-spacing:.2px}
.road-card .pct{font-size:46px;font-weight:800;letter-spacing:-2px;line-height:1.05;position:relative}
.road-card .pct small{font-size:19px;font-weight:700;opacity:.8}
.road-stat{display:flex;gap:24px;margin-top:14px;position:relative}
.road-stat .s b{font-size:18px;font-weight:800}
.road-stat .s span{display:block;font-size:11px;opacity:.82;margin-top:1px}
.road{height:46px;margin:16px -22px 0;background:rgba(0,0,0,.13);position:relative;display:flex;align-items:center;overflow:hidden}
.road .lane{position:absolute;top:50%;left:0;right:0;height:3px;transform:translateY(-50%);background:repeating-linear-gradient(90deg,#fff 0 16px,transparent 16px 32px);opacity:.45}
.road .car{position:absolute;top:50%;transform:translateY(-50%);font-size:24px;filter:drop-shadow(0 4px 6px rgba(0,0,0,.3));animation:drive 3.5s ease-in-out infinite}
@keyframes drive{0%,100%{left:60%}50%{left:66%}}
.road .flag{position:absolute;top:50%;right:16px;transform:translateY(-50%);font-size:21px}

/* продолжить */
.continue{display:flex;align-items:center;gap:13px;background:var(--card);border-radius:18px;padding:14px 16px;margin-bottom:12px;cursor:pointer;box-shadow:0 8px 22px -16px rgba(15,31,24,.2);position:relative;overflow:hidden}
.continue:active{transform:scale(.985)}
.continue .ci{width:38px;height:38px;border-radius:12px;background:var(--mint);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.continue .ctxt{flex:1}
.continue .ctxt b{font-size:14px;font-weight:800;display:block}
.continue .ctxt span{font-size:12px;color:var(--ink3);font-weight:600}
.continue .cbar{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--line)}
.continue .cbar i{display:block;height:100%;background:var(--green)}

/* экзамен-кнопка */
.exam-btn{display:flex;align-items:center;gap:14px;background:var(--card);border-radius:20px;padding:17px;margin-bottom:12px;cursor:pointer;box-shadow:0 10px 28px -18px rgba(15,31,24,.26)}
.exam-btn:active{transform:scale(.985)}
.exam-btn .ic{width:50px;height:50px;border-radius:15px;background:linear-gradient(135deg,#00b86b,#059862);display:flex;align-items:center;justify-content:center;font-size:25px;flex-shrink:0;box-shadow:0 8px 18px -8px rgba(0,184,107,.5)}
.exam-btn .txt{flex:1}
.exam-btn h3{font-size:16px;font-weight:800;letter-spacing:-.3px}
.exam-btn p{font-size:12.5px;color:var(--ink3);margin-top:2px;font-weight:600}
.exam-btn .go{color:var(--ink3);font-size:20px;flex-shrink:0}

/* режимы 2x2 */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.g{background:var(--card);border-radius:19px;padding:17px;cursor:pointer;box-shadow:0 8px 22px -16px rgba(15,31,24,.2);position:relative}
.g:active{transform:scale(.97)}
.g .e{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:10px}
.g.tk .e{background:var(--mint)}.g.er .e{background:var(--amber-s)}.g.du .e{background:var(--red-s)}.g.vo .e{background:#ece8ff}
[data-dark] .g.vo .e{background:#241f33}
.g b{font-size:14.5px;font-weight:800;letter-spacing:-.2px;display:block}
.g span{font-size:12px;color:var(--ink3);font-weight:600;margin-top:1px;display:block}
.g .badge{position:absolute;top:14px;right:14px;font-size:9px;font-weight:800;background:var(--red);color:#fff;padding:3px 7px;border-radius:99px;letter-spacing:.4px}

/* рейтинг превью */
.rank-prev{background:var(--card);border-radius:19px;padding:6px;box-shadow:0 8px 22px -16px rgba(15,31,24,.2);margin-bottom:8px}
.rank-row{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:14px}
.rank-row+.rank-row{border-top:1px solid var(--line)}
.rk{width:24px;text-align:center;font-size:14px;font-weight:800;color:var(--ink3)}
.rk.g1{color:#f5b800}
.rav{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:14px}
.rnm{flex:1;font-size:13.5px;font-weight:700}
.rsc{font-size:14px;font-weight:800;color:var(--green);font-variant-numeric:tabular-nums}

/* вопрос дня */
.qday{background:linear-gradient(135deg,var(--card),var(--mint));border:1.5px solid var(--mint);border-radius:19px;padding:16px;margin-bottom:18px;box-shadow:0 8px 22px -16px rgba(0,184,107,.25)}
.qday .qd-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.qday .qd-ic{width:30px;height:30px;border-radius:9px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:15px}
.qday .qd-top b{font-size:13px;font-weight:800}
.qday .qd-top span{margin-left:auto;font-size:11px;color:var(--ink3);font-weight:700}
.qday .qd-q{font-size:14.5px;font-weight:700;line-height:1.4;margin-bottom:12px;letter-spacing:-.2px}
.qday .qd-opts{display:flex;flex-direction:column;gap:7px}
.qday .qd-o{padding:11px 13px;border-radius:12px;border:1.5px solid var(--line);font-size:13.5px;font-weight:600;cursor:pointer;transition:.15s;background:var(--card)}
.qday .qd-o:active{border-color:var(--green)}
.qday .qd-o.ok{border-color:var(--green);background:var(--mint)}
.qday .qd-o.no{border-color:var(--red);background:var(--red-s)}

/* === ЭКРАН ВОПРОСА === */
.qhead{display:flex;align-items:center;gap:11px;margin-bottom:8px}
.back{width:38px;height:38px;border-radius:12px;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--ink2);box-shadow:0 4px 14px -8px rgba(15,31,24,.2);cursor:pointer;flex-shrink:0}
.qtitle{font-size:15px;font-weight:800}
.qtitle span{display:block;font-size:11.5px;color:var(--ink3);font-weight:600}
.qtimer{margin-left:auto;font-size:14px;font-weight:800;color:var(--green);background:var(--mint);padding:7px 13px;border-radius:99px;font-variant-numeric:tabular-nums}
.dots{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.dots i{flex:1;min-width:8px;height:5px;border-radius:99px;background:var(--line)}
.dots i.ok{background:var(--green)}.dots i.no{background:var(--red)}.dots i.cur{background:var(--ink3)}
.qcard{background:var(--card);border-radius:24px;padding:18px;box-shadow:0 14px 40px -22px rgba(15,31,24,.25)}
.qpic{width:100%;border-radius:17px;background:linear-gradient(135deg,#d4f5e4,#eefbf4);display:flex;align-items:center;justify-content:center;margin-bottom:15px;position:relative;overflow:hidden;min-height:120px}
.qpic img{width:100%;height:auto;display:block;border-radius:17px}
.signpost{width:90px;height:90px;border-radius:50%;background:#fff;border:8px solid var(--red);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 26px -8px rgba(255,66,89,.4);margin:30px 0}
.signpost b{font-size:29px;font-weight:800;color:#0f1f18}
.qtext{font-size:16.5px;font-weight:700;line-height:1.4;letter-spacing:-.3px;margin-bottom:16px}
.ans{display:flex;flex-direction:column;gap:9px}
.a{display:flex;align-items:center;gap:12px;padding:14px 15px;border-radius:15px;border:2px solid var(--line);font-size:14.5px;font-weight:600;cursor:pointer;transition:.18s;background:var(--card);text-align:left}
.a .lk{width:25px;height:25px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--ink2);flex-shrink:0}
.a.ok{border-color:var(--green);background:var(--mint)}
.a.ok .lk{background:var(--green);color:#fff}
.a.no{border-color:var(--red);background:var(--red-s)}
.a.no .lk{background:var(--red);color:#fff}
.a.dim{opacity:.5}
.explain{margin-top:14px;background:var(--mint);border-radius:15px;padding:14px;font-size:13px;line-height:1.5;color:var(--ink2);display:flex;gap:10px}
.explain .ai{flex-shrink:0;width:26px;height:26px;border-radius:8px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:14px}
.explain b{color:var(--ink);font-weight:700}

/* === РЕЗУЛЬТАТ === */
.result-hero{text-align:center;padding:20px 0 6px}
.result-badge{width:96px;height:96px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:46px}
.result-badge.pass{background:var(--mint)}.result-badge.fail{background:var(--red-s)}
.result-title{font-size:24px;font-weight:800;letter-spacing:-.5px}
.result-sub{font-size:14px;color:var(--ink2);margin-top:4px;font-weight:600}
.result-stats{display:flex;gap:11px;margin:20px 0}
.rs{flex:1;background:var(--card);border-radius:18px;padding:16px;text-align:center;box-shadow:0 8px 22px -16px rgba(15,31,24,.2)}
.rs b{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;display:block}
.rs.g b{color:var(--green)}.rs.r b{color:var(--red)}
.rs span{font-size:11px;color:var(--ink3);font-weight:700;margin-top:2px;display:block}

/* === БИЛЕТЫ === */
.tickets{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.tk-cell{aspect-ratio:1;border-radius:16px;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 18px -14px rgba(15,31,24,.2);position:relative;transition:transform .14s}
.tk-cell:active{transform:scale(.94)}
.tk-cell b{font-size:18px;font-weight:800}
.tk-cell span{font-size:9.5px;color:var(--ink3);font-weight:600;margin-top:1px}
.tk-cell.done{background:var(--mint)}
.tk-cell.done b{color:var(--green)}
.tk-cell.done::after{content:'✓';position:absolute;top:5px;right:7px;font-size:10px;color:var(--green);font-weight:800}

/* === СТАТИСТИКА === */
.ring-card{background:var(--card);border-radius:24px;padding:22px;box-shadow:0 12px 34px -20px rgba(15,31,24,.22);margin-bottom:14px;display:flex;align-items:center;gap:20px}
.ring{position:relative;width:110px;height:110px;flex-shrink:0}
.ring svg{transform:rotate(-90deg)}
.ring .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .center b{font-size:27px;font-weight:800;letter-spacing:-1px}
.ring .center span{font-size:10px;color:var(--ink3);font-weight:700}
.ring-info b{font-size:17px;font-weight:800;display:block;margin-bottom:3px}
.ring-info p{font-size:13px;color:var(--ink2);line-height:1.5;font-weight:500}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:18px}
.sc{background:var(--card);border-radius:17px;padding:16px;box-shadow:0 8px 22px -16px rgba(15,31,24,.18)}
.sc .ic{font-size:20px;margin-bottom:8px;display:block}
.sc b{font-size:23px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.sc span{font-size:12px;color:var(--ink3);font-weight:600;display:block;margin-top:1px}
.weak{background:var(--card);border-radius:15px;padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;gap:13px;box-shadow:0 6px 18px -14px rgba(15,31,24,.16)}
.weak .we{font-size:20px}.weak .winfo{flex:1}
.weak .wn{font-size:13.5px;font-weight:700}
.weak .wbar{height:6px;background:var(--bg);border-radius:99px;margin-top:6px;overflow:hidden}
.weak .wbar i{display:block;height:100%;border-radius:99px}
.weak .wpc{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums}

/* === РЕЙТИНГ === */
.tabs{display:flex;background:var(--card);border-radius:14px;padding:4px;margin-bottom:16px;box-shadow:0 6px 18px -14px rgba(15,31,24,.16)}
.tabs button{flex:1;border:none;background:none;font-family:var(--f);font-size:13px;font-weight:800;padding:9px;border-radius:11px;color:var(--ink3);cursor:pointer}
.tabs button.on{background:var(--green);color:#fff}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin-bottom:18px}
.pod{text-align:center}
.pod .pav{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;margin:0 auto 7px;position:relative}
.pod.p1 .pav{width:64px;height:64px;font-size:24px;background:linear-gradient(135deg,#ffd60a,#ff9f0a)}
.pod.p2 .pav{width:54px;height:54px;font-size:20px;background:linear-gradient(135deg,#00b86b,#059862)}
.pod.p3 .pav{width:54px;height:54px;font-size:20px;background:linear-gradient(135deg,#7c6cff,#5a4fd0)}
.pod .crown{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:20px}
.pod .pn{font-size:13px;font-weight:800}
.pod .ps{font-size:12px;color:var(--green);font-weight:800}
.pod .base{margin-top:8px;border-radius:12px 12px 0 0;background:var(--card);display:flex;align-items:flex-start;justify-content:center;padding-top:8px;font-size:16px;font-weight:800;color:var(--ink3);box-shadow:0 -4px 14px -10px rgba(15,31,24,.2)}
.pod.p1 .base{height:52px}.pod.p2 .base{height:38px}.pod.p3 .base{height:30px}
.lb{background:var(--card);border-radius:18px;padding:6px;box-shadow:0 8px 22px -16px rgba(15,31,24,.18)}
.lbr{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px}
.lbr+.lbr{border-top:1px solid var(--line)}
.lbr.me{background:var(--mint)}
.lbr .n{width:24px;text-align:center;font-size:14px;font-weight:800;color:var(--ink3)}
.lbr .av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:14px}
.lbr .nm{flex:1;font-size:14px;font-weight:700}
.lbr .sc2{font-size:14px;font-weight:800;color:var(--green);font-variant-numeric:tabular-nums}

/* === ПРОФИЛЬ === */
.prof-head{text-align:center;padding:8px 0 18px}
.prof-av{width:90px;height:90px;border-radius:50%;margin:0 auto 12px;background:linear-gradient(135deg,#00c878,#059862);display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:800;color:#fff;box-shadow:0 12px 28px -10px rgba(0,184,107,.5)}
.prof-name{font-size:21px;font-weight:800;letter-spacing:-.4px}
.prof-meta{font-size:13px;color:var(--ink3);font-weight:600;margin-top:3px}
.premium{background:linear-gradient(135deg,#1a1d26,#0d0f15);border-radius:20px;padding:18px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}
.premium .pc-glow{position:absolute;top:-30px;right:-20px;width:120px;height:120px;background:rgba(255,196,0,.18);border-radius:50%}
.premium h3{font-size:16px;font-weight:800;display:flex;align-items:center;gap:7px;position:relative}
.premium p{font-size:12.5px;opacity:.8;margin-top:4px;position:relative;line-height:1.5}
.premium .pbtn{margin-top:13px;background:linear-gradient(135deg,#ffc400,#ff9d0a);color:#1a1d26;border:none;font-family:var(--f);font-weight:800;font-size:13.5px;padding:11px 18px;border-radius:13px;cursor:pointer;position:relative}
.premium.active-prem{background:linear-gradient(135deg,#00b86b,#03704c)}
.menu{background:var(--card);border-radius:18px;overflow:hidden;box-shadow:0 8px 22px -16px rgba(15,31,24,.18)}
.mi{display:flex;align-items:center;gap:13px;padding:15px 16px;cursor:pointer}
.mi+.mi{border-top:1px solid var(--line)}
.mi .mic{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--mint)}
.mi .mt{flex:1;font-size:14.5px;font-weight:700}
.mi .ma{color:var(--ink3);font-size:14px;font-weight:600}
.toggle{width:44px;height:26px;border-radius:99px;background:var(--line);position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(18px)}

/* нижняя навигация */
.nav{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:452px;background:rgba(255,255,255,.84);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);border:1px solid rgba(255,255,255,.7);box-shadow:0 14px 40px -10px rgba(15,31,24,.25);border-radius:26px;display:flex;justify-content:space-around;padding:11px 6px;z-index:50}
[data-dark] .nav{background:rgba(26,33,26,.84);border-color:rgba(255,255,255,.08)}
.nav a{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--ink3);font-size:10px;font-weight:700;text-decoration:none;flex:1;padding:3px 0;cursor:pointer}
.nav a svg{width:24px;height:24px}

/* модалка */
.modal-bg{position:fixed;inset:0;background:rgba(15,31,24,.5);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:flex-end;justify-content:center;padding:0}
.modal{background:var(--card);border-radius:26px 26px 0 0;padding:24px 20px 30px;width:100%;max-width:480px;animation:slideup .3s cubic-bezier(.3,0,.2,1)}

// --- Тема ---
function applyTheme(){

// --- Звук ---
function playSound(type){
  if(!S.sound)return;
  try{
    var ctx=window._actx||(window._actx=new(window.AudioContext||window.webkitAudioContext)());
    var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
    if(type==='correct'){o.type='sine';g.gain.setValueAtTime(.0001,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.15,ctx.currentTime+.02);g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+.25);o.frequency.setValueAtTime(660,ctx.currentTime);o.frequency.setValueAtTime(880,ctx.currentTime+.08);o.start();o.stop(ctx.currentTime+.26);}
    else{o.type='sine';g.gain.setValueAtTime(.0001,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.12,ctx.currentTime+.02);g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+.3);o.frequency.setValueAtTime(220,ctx.currentTime);o.frequency.setValueAtTime(160,ctx.currentTime+.12);o.start();o.stop(ctx.currentTime+.31);}
  }catch(e){}
}

  app.scrollTop=0;window.scrollTo(0,0);
  if(page==='home')renderHome(app);
  else if(page==='exam')renderExamStart(app);
  else if(page==='tickets')renderTickets(app);
  else if(page==='stats')renderStats(app);
  else if(page==='rating')renderRating(app);
  else if(page==='profile')renderProfile(app);
  else if(page==='errors')renderErrors(app);
  else renderHome(app);
}

// --- Утилиты ---
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function avColor(name){var c=['#00b86b,#059862','#ff7a3d,#e8500f','#06b6c4,#0894a0','#7c6cff,#5a4fd0','#ffd60a,#ff9f0a'];var i=(name||'').length%c.length;return 'linear-gradient(135deg,'+c[i].split(',')[0]+','+c[i].split(',')[1]+')';}

// ====== ЭКРАНЫ (рендер) ======

// Вычислить статистику пользователя
function calcStats(){
  var total=S.questions.length||1240;
  var solved=Object.keys(S.progress).length;
  var correct=0;Object.values(S.progress).forEach(function(p){if(p.correct)correct++;});
  var acc=solved?Math.round(correct/solved*100):0;
  // готовность = % решённых с учётом точности
  var readiness=Math.round((solved/total)*100*(acc/100)+(acc*0.0));
  readiness=Math.min(100,Math.round((solved/total*0.6+acc/100*0.4)*100));
  // билеты пройдено
  var ticketsDone={};
  S.questions.forEach(function(q){if(S.progress[q.id]){ticketsDone[q.ticket]=(ticketsDone[q.ticket]||0)+1;}});
  var fullTickets=Object.keys(ticketsDone).filter(function(t){return ticketsDone[t]>=20;}).length;
  return {total:total,solved:solved,correct:correct,acc:acc,readiness:readiness,fullTickets:fullTickets,totalTickets:62};
}

    +'<div class="g er" onclick="go(\'errors\')"><div class="e">🎯</div><b>'+t('mode_errors')+'</b><span>'+errCount+' '+t('mode_errors_sub')+'</span></div>'
    +'<div class="g du" onclick="toast(\'Скоро!\')"><span class="badge">LIVE</span><div class="e">⚔️</div><b>'+t('mode_duel')+'</b><span>'+t('mode_duel_sub')+'</span></div>'
    +'<div class="g vo" onclick="toast(\'Скоро!\')"><div class="e">🔊</div><b>'+t('mode_audio')+'</b><span>'+t('mode_audio_sub')+'</span></div>'
    +'</div>';
  // рейтинг превью (заглушка пока)
  html+='<div class="sec">'+t('rating_week')+' <span class="more" onclick="go(\'rating\')">'+t('all')+' →</span></div>';
  html+='<div class="rank-prev" id="homeRank"><div style="padding:20px;text-align:center;color:var(--ink3);font-size:13px">Загрузка...</div></div>';

function loadHomeRank(){
  if(!S.dbOK)return;
  sbGet('scores','order=weekly_score.desc&limit=3').then(function(rows){

  var ticketsDone={};
  S.questions.forEach(function(q){if(S.progress[q.id]&&S.progress[q.id].correct){ticketsDone[q.ticket]=(ticketsDone[q.ticket]||0)+1;}});

// ===== ЭКРАН ВОПРОСА (универсальный для экзамена/билета/ошибок) =====
var QUIZ=null; // {questions, idx, answers, mode, ticket, startTime, timer}
function startExam(ticket){
  // собрать вопросы
  var pool;
  if(ticket>0){pool=S.questions.filter(function(q){return q.ticket===ticket;});}
  else{pool=shuffle(S.questions.slice()).slice(0,20);}
  if(!pool.length){toast('Вопросы ещё не загружены');return;}
  QUIZ={questions:pool,idx:0,answers:[],mode:ticket>0?'ticket':'exam',ticket:ticket,startTime:Date.now(),maxErrors:2};
  renderQuestion();
}
function startErrors(){
  var errIds=Object.keys(S.progress).filter(function(id){return !S.progress[id].correct;});
  var pool=S.questions.filter(function(q){return errIds.indexOf(String(q.id))>=0;});
  if(!pool.length){toast(t('no_errors'));return;}
  QUIZ={questions:pool,idx:0,answers:[],mode:'errors',ticket:0,startTime:Date.now(),maxErrors:99};
  renderQuestion();
}
function renderQuestion(){
  var app=document.getElementById('app');
  var q=QUIZ.questions[QUIZ.idx];
  var qtext=S.lang==='uz'&&q.question_uz?q.question_uz:q.question_ru;
  var opts=(S.lang==='uz'&&q.options_uz?q.options_uz:q.options_ru).split('|');
  var html='';
  // шапка
  html+='<div class="qhead"><div class="back" onclick="quizExit()">←</div>'
    +'<div class="qtitle">'+(QUIZ.ticket>0?t('ticket')+' '+QUIZ.ticket:t('exam'))+'<span>'+t('question')+' '+(QUIZ.idx+1)+' '+t('of')+' '+QUIZ.questions.length+'</span></div>';
  if(QUIZ.mode==='exam')html+='<div class="qtimer" id="examTimer">⏱ 25:00</div>';
  html+='</div>';
  // точки прогресса
  html+='<div class="dots">';
  for(var i=0;i<QUIZ.questions.length;i++){
    var cls='';
    if(i<QUIZ.answers.length)cls=QUIZ.answers[i].correct?'ok':'no';
    else if(i===QUIZ.idx)cls='cur';
    html+='<i class="'+cls+'"></i>';
  }
  html+='</div>';
  // карточка
  html+='<div class="qcard">';
  if(q.image_url)html+='<div class="qpic"><img src="'+esc(q.image_url)+'" alt=""></div>';
  html+='<div class="qtext">'+esc(qtext)+'</div>';
  html+='<div class="ans" id="ansBox">';
  opts.forEach(function(o,i){
    html+='<button class="a" onclick="answerQ('+i+')"><span class="lk">'+String.fromCharCode(65+i)+'</span> '+esc(o)+'</button>';
  });
  html+='</div>';
  html+='<div id="explainBox"></div>';
  html+='<div id="nextBox"></div>';
  html+='</div>';
  app.innerHTML=html;
  if(QUIZ.mode==='exam')startTimer();
}
function answerQ(idx){
  var q=QUIZ.questions[QUIZ.idx];
  if(QUIZ.answered)return;
  QUIZ.answered=true;
  var correct=idx===q.correct_index;
  QUIZ.answers.push({qid:q.id,chosen:idx,correct:correct});
  playSound(correct?'correct':'wrong');
  // подсветка
  var btns=document.querySelectorAll('#ansBox .a');
  btns.forEach(function(b,i){
    if(i===q.correct_index)b.classList.add('ok');
    else if(i===idx)b.classList.add('no');
    else b.classList.add('dim');
    b.onclick=null;
  });
  // сохранить прогресс
  saveProgress(q.id,correct);
  // объяснение
  var expl=S.lang==='uz'&&q.explain_uz?q.explain_uz:q.explain_ru;
  if(expl){
    document.getElementById('explainBox').innerHTML='<div class="explain"><div class="ai">🤖</div><div><b>'+t('why')+':</b> '+esc(expl)+'</div></div>';
  }
  // кнопка дальше
  document.getElementById('nextBox').innerHTML='<button class="btn-main" style="margin-top:14px" onclick="nextQ()">'+(QUIZ.idx+1>=QUIZ.questions.length?(S.lang==='uz'?'Yakunlash':'Завершить'):t('next'))+' →</button>';
  // проверка провала экзамена
  if(QUIZ.mode==='exam'){
    var errs=QUIZ.answers.filter(function(a){return !a.correct;}).length;
    if(errs>QUIZ.maxErrors){QUIZ.failed=true;}
  }
}
function nextQ(){
  QUIZ.answered=false;
  if(QUIZ.idx+1>=QUIZ.questions.length||QUIZ.failed){finishQuiz();return;}
  QUIZ.idx++;
  renderQuestion();
}
function quizExit(){if(QUIZ&&QUIZ.timer)clearInterval(QUIZ.timer);QUIZ=null;go('home');}

// таймер экзамена
function startTimer(){
  if(QUIZ.timer)clearInterval(QUIZ.timer);
  if(!QUIZ.endTime)QUIZ.endTime=Date.now()+25*60*1000;
  QUIZ.timer=setInterval(function(){
    var left=Math.max(0,Math.floor((QUIZ.endTime-Date.now())/1000));
    var el=document.getElementById('examTimer');
    if(el)el.textContent='⏱ '+Math.floor(left/60)+':'+('0'+(left%60)).slice(-2);
    if(left<=0){clearInterval(QUIZ.timer);finishQuiz();}
  },1000);
}

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var x=a[i];a[i]=a[j];a[j]=x;}return a;}

// ===== ФИНИШ КВИЗА =====
function finishQuiz(){
  if(QUIZ.timer)clearInterval(QUIZ.timer);
  var correct=QUIZ.answers.filter(function(a){return a.correct;}).length;
  var total=QUIZ.questions.length;
  var errs=total-correct;
  var time=Math.floor((Date.now()-QUIZ.startTime)/1000);
  var passed=QUIZ.mode==='exam'?(errs<=QUIZ.maxErrors&&QUIZ.answers.length>=total):true;
  // сохранить результат экзамена
  if(QUIZ.mode==='exam'&&S.user&&S.dbOK){
    sbPost('exam_results',{user_email:S.user.email,ticket:QUIZ.ticket,correct_count:correct,total:total,passed:passed,time_seconds:time});
    addScore(passed?50:10);
  }
  renderResult(correct,total,errs,time,passed);
}
function renderResult(correct,total,errs,time,passed){
  var app=document.getElementById('app');
  var mm=Math.floor(time/60),ss=('0'+(time%60)).slice(-2);
  var html='';
  html+='<div class="result-hero"><div class="result-badge '+(passed?'pass':'fail')+'">'+(passed?'🎉':'😔')+'</div>'
    +'<div class="result-title">'+(passed?t('exam_passed'):t('exam_failed'))+'</div>'
    +'<div class="result-sub">'+correct+' '+t('of')+' '+total+' '+(S.lang==='uz'?'toʻgʻri':'правильно')+'</div></div>';
  html+='<div class="result-stats"><div class="rs g"><b>'+correct+'</b><span>'+t('correct')+'</span></div><div class="rs r"><b>'+errs+'</b><span>'+t('errors')+'</span></div><div class="rs"><b>'+mm+':'+ss+'</b><span>'+t('time')+'</span></div></div>';
  // разбор ошибок
  var wrong=QUIZ.answers.filter(function(a){return !a.correct;});
  if(wrong.length){
    html+='<div class="sec">'+t('review_errors')+'</div>';
    wrong.forEach(function(a){
      var q=QUIZ.questions.find(function(x){return x.id===a.qid;});
      if(!q)return;
      var opts=(S.lang==='uz'&&q.options_uz?q.options_uz:q.options_ru).split('|');
      var qtext=S.lang==='uz'&&q.question_uz?q.question_uz:q.question_ru;
      html+='<div class="weak" style="align-items:flex-start"><span class="we">❌</span><div class="winfo"><div class="wn">'+esc(qtext)+'</div>'
        +'<div style="font-size:12px;color:var(--ink3);margin-top:4px">'+(S.lang==='uz'?'Toʻgʻri':'Верно')+': <b style="color:var(--green)">'+esc(opts[q.correct_index]||'')+'</b></div></div></div>';
    });
  }else{
    html+='<div class="weak" style="background:var(--mint)"><span class="we">✅</span><div class="winfo"><div class="wn">'+t('no_errors')+'</div></div></div>';
  }
  html+='<button class="btn-main" style="margin-top:18px" onclick="go(\'home\')">'+(S.lang==='uz'?'Bosh sahifa':'На главную')+'</button>';
  if(!passed)html+='<button class="btn-ghost" style="margin-top:10px" onclick="startExam('+QUIZ.ticket+')">'+t('retry')+'</button>';
  app.innerHTML=html;
  QUIZ=null;
}

// ===== СОХРАНЕНИЕ ПРОГРЕССА =====
function saveProgress(qid,correct){
  S.progress[qid]={correct:correct};
  if(S.user&&S.dbOK){
    // upsert через on_conflict (один запрос, без дублей)
    fetch(SB_URL+'/rest/v1/progress?on_conflict=user_email,question_id',{
      method:'POST',
      headers:Object.assign({},SBH,{Prefer:'resolution=merge-duplicates'}),
      body:JSON.stringify({user_email:S.user.email,question_id:qid,correct:correct})
    }).catch(function(){});
  }
}
function addScore(pts){
  if(!S.user||!S.dbOK)return;
  var wk=weekStart();
  sbGet('scores','user_email=eq.'+encodeURIComponent(S.user.email)).then(function(rows){
    if(rows&&rows.length){
      var r=rows[0];
      var weekly=(r.week_start===wk)?(r.weekly_score||0)+pts:pts;
      sbPatch('scores','user_email=eq.'+encodeURIComponent(S.user.email),{total_score:(r.total_score||0)+pts,weekly_score:weekly,week_start:wk});
    }else{
      sbPost('scores',{user_email:S.user.email,total_score:pts,weekly_score:pts,week_start:wk});
    }
  });
}
function weekStart(){var d=new Date();var day=d.getDay()||7;d.setDate(d.getDate()-day+1);return d.toISOString().slice(0,10);}

// ===== ЗАГРУЗКА ДАННЫХ =====
function loadAll(){
  if(!S.dbOK)return Promise.resolve();
  var tasks=[];
  // вопросы (постранично, обход лимита 1000)
  tasks.push(loadQuestions());
  // прогресс пользователя
  if(S.user)tasks.push(sbGet('progress','user_email=eq.'+encodeURIComponent(S.user.email)+'&select=question_id,correct').then(function(rows){
    (rows||[]).forEach(function(p){S.progress[p.question_id]={correct:p.correct};});
  }));
  return Promise.all(tasks);
}
function loadQuestions(){
  var all=[],page=0,size=1000;
  function next(){
    return sbGet('questions','select=*&order=ticket.asc,num.asc&offset='+(page*size)+'&limit='+size).then(function(rows){
      if(rows&&rows.length){all=all.concat(rows);if(rows.length===size){page++;return next();}}
      S.questions=all;
    });
  }
  return next();
}

function doLogin(){
  var em=val('auEm'),pw=val('auPw');
  if(!em||!pw){showErr('auErr','Введите email и пароль');return;}
  sbGet('users','email=eq.'+encodeURIComponent(em)+'&select=*').then(function(rows){
    if(!rows||!rows.length){showErr('auErr','❌ Email не найден');return;}
    var u=rows[0];

    loadAll().then(function(){go('home');});
    toast('Добро пожаловать!');

function doRegister(){
  var nm=val('rgNm'),em=val('rgEm'),pw=val('rgPw');
  if(!nm||!em||!pw){showErr('rgErr','Заполни все поля');return;}
  sbGet('users','email=eq.'+encodeURIComponent(em)+'&select=email').then(function(rows){
    if(rows&&rows.length){showErr('rgErr','❌ Email уже занят');return;}
    var newU={email:em,password:pw,name:nm,lang:S.lang,status:'active',role:'student'};
    if(isTG()&&TG_USER){newU.tg_id=String(TG_USER.id);newU.tg_chat_id=String(TG_USER.id);}

      setUser(newU);closeModal();
      loadAll().then(function(){go('home');});
      toast('Аккаунт создан!');
    });
  });
}

  // авто-вход телеграм
  if(TG_USER&&!S.user&&S.dbOK){try{await tgAutoLogin();}catch(e){}}
  // загрузка данных
  if(S.dbOK){try{await loadAll();}catch(e){}}
  document.getElementById('loading').classList.add('hidden');
  go('home');
}
window.addEventListener('DOMContentLoaded',init);

</script>
